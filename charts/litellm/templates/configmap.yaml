apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: config
data:
  config.yml: |-
    # LiteLLM configuration (static placeholder)
    model_list:
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: gpt-3.5-turbo
    general_settings:
      health_endpoint_auth: false
