apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "litellm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "litellm.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "litellm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_LOG
              value: {{ .Values.env.LITELLM_LOG | quote }}
            - name: LITELLM_PORT
              value: {{ .Values.env.LITELLM_PORT | quote }}
            - name: LITELLM_MASTER_KEY
              {{- if .Values.masterSalt.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.masterSalt.existingSecret.name }}
                  key: {{ .Values.masterSalt.existingSecret.masterKey | default "LITELLM_MASTER_KEY" }}
              {{- else if .Values.masterSalt.createSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "litellm.fullname" . }}-master-salt
                  key: LITELLM_MASTER_KEY
              {{- else }}
              value: {{ .Values.env.LITELLM_MASTER_KEY | default "CHANGEME" | quote }}
              {{- end }}
            - name: LITELLM_SALT_KEY
              {{- if .Values.masterSalt.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.masterSalt.existingSecret.name }}
                  key: {{ .Values.masterSalt.existingSecret.saltKey | default "LITELLM_SALT_KEY" }}
              {{- else if .Values.masterSalt.createSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "litellm.fullname" . }}-master-salt
                  key: LITELLM_SALT_KEY
              {{- else }}
              value: {{ .Values.env.LITELLM_SALT_KEY | default "CHANGEME" | quote }}
              {{- end }}
            - name: DISABLE_DATABASE
              value: {{ .Values.env.DISABLE_DATABASE | quote }}
            - name: USE_DATABASE
              value: {{ .Values.env.USE_DATABASE | quote }}
            - name: STORE_MODEL_IN_DB
              value: {{ .Values.env.STORE_MODEL_IN_DB | quote }}
            {{- if .Values.apiKeys.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.apiKeys.existingSecret.name }}
                  name: {{ .Values.apiKeys.existingSecret.name }}
                  key: {{ .Values.apiKeys.existingSecret.key | default "OPENAI_API_KEY" }}
                  {{- else }}
                  name: {{ include "litellm.fullname" . }}-apikeys
                  key: OPENAI_API_KEY
                  {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yml
              subPath: config.yml
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "litellm.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "litellm.fullname" . }}-data
        {{- end }}
