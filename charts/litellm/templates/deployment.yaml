apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      # Wait for Postgres to be ready before starting LiteLLM to avoid early auth failures
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-pguser-litellm
                  key: password
          command: ["/bin/sh","-c"]
          args:
            - |
              echo "[wait-for-postgres] Waiting for Postgres primary to accept connections";
              for i in $(seq 1 60); do
                pg_isready -h litellm-pg-primary -p 5432 -U litellm -d litellmdb && echo "Postgres is ready" && exit 0;
                sleep 2;
              done;
              echo "Postgres not ready after waiting";
              exit 1;
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_LOG
              value: "INFO"
            - name: LITELLM_PORT
              value: "4000"
            - name: LITELLM_CONFIG
              value: "/config/config.yml"
            # Ensure Prisma can write its binary cache in a writable path (non-root image may lack /root or /). Use /tmp/prisma-cache.
            - name: PRISMA_CLIENT_ENGINE_TYPE
              value: "binary"
            - name: PRISMA_CLI_QUERY_ENGINE_TYPE
              value: "binary"
            - name: PRISMA_CLI_ENGINE_TYPE
              value: "binary"
            - name: PRISMA_CACHE_DIR
              value: "/tmp/prisma-cache"
            - name: HOME
              value: "/tmp"
            - name: XDG_CACHE_HOME
              value: "/tmp/.cache"
            - name: PRISMA_HIDE_UPDATE_MESSAGE
              value: "1"
            # Master/Salt keys (already supplied via llm-keys secret)
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: LITELLM_SALT_KEY
            # Database flags currently disable persistence; to enable Admin UI persistence:
            #   1. Create a secret 'litellm-db' with key DATABASE_URL (Postgres connection string)
            #   2. Switch DISABLE_DATABASE -> "False", USE_DATABASE -> "True", STORE_MODEL_IN_DB -> "True"
            #   3. (Optional) remove these comments after enabling
            - name: DISABLE_DATABASE
              value: "False"       # database enabled
            - name: USE_DATABASE
              value: "True"        # use database
            - name: STORE_MODEL_IN_DB
              value: "True"        # persist model_list / UI-created models
            # DATABASE_URL from Crunchy operator generated secret (adjust secret name if different).
            # Typical pattern: <cluster>-pguser-<username>
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-pguser-litellm
                  key: uri
            # Some Prisma clients also look for PRISMA_DATABASE_URL explicitly; mirror it.
            - name: PRISMA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-pguser-litellm
                  key: uri
          livenessProbe:
            httpGet:
              # /health requires API key auth; /health/liveness is unauthenticated per upstream code
              path: /health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              # Use /health now that DB is enabled; config sets health_endpoint_auth: false so this stays unauthenticated.
              # /health performs broader checks than /health/liveness (ensures DB + core services initialized).
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: prisma-cache
              mountPath: /tmp/prisma-cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: prisma-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
