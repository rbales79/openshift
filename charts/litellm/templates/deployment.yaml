apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_LOG
              value: "INFO"
            - name: LITELLM_PORT
              value: "4000"
            - name: LITELLM_CONFIG
              value: "/config/config.yml"
            # Master/Salt keys (already supplied via llm-keys secret)
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: LITELLM_SALT_KEY
            # Database flags currently disable persistence; to enable Admin UI persistence:
            #   1. Create a secret 'litellm-db' with key DATABASE_URL (Postgres connection string)
            #   2. Switch DISABLE_DATABASE -> "False", USE_DATABASE -> "True", STORE_MODEL_IN_DB -> "True"
            #   3. (Optional) remove these comments after enabling
            - name: DISABLE_DATABASE
              value: "False"       # database enabled
            - name: USE_DATABASE
              value: "True"        # use database
            - name: STORE_MODEL_IN_DB
              value: "True"        # persist model_list / UI-created models
            # Optional DATABASE_URL (add secret first). Leaving this present but DB disabled suppresses nothing;
            # you must flip the flags above for LiteLLM to initialize the DB.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              # /health requires API key auth; /health/liveness is unauthenticated per upstream code
              path: /health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              # Use /health now that DB is enabled; config sets health_endpoint_auth: false so this stays unauthenticated.
              # /health performs broader checks than /health/liveness (ensures DB + core services initialized).
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
