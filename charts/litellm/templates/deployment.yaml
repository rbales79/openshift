apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "litellm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "litellm.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "litellm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_LOG
              value: {{ .Values.env.LITELLM_LOG | default "INFO" | quote }}
            - name: LITELLM_PORT
              value: {{ .Values.env.LITELLM_PORT | default "4000" | quote }}
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.env.LITELLM_MASTER_KEY | default "sk-1234" | quote }}
            - name: LITELLM_SALT_KEY
              value: {{ .Values.env.LITELLM_SALT_KEY | default "sk-XXXXXXXX" | quote }}
            - name: DATABASE_URL
              value: "postgresql://litellm:litellmpassword@{{ include "litellm.fullname" . }}-postgres-primary:5432/litellm"
            - name: PORT
              value: {{ .Values.env.PORT | default "4000" | quote }}
            - name: STORE_MODEL_IN_DB
              value: {{ .Values.env.STORE_MODEL_IN_DB | default "True" | quote }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          command:
            - "litellm"
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
            - "--host"
            - "0.0.0.0"
      volumes:
        - name: config
          configMap:
            name: {{ include "litellm.fullname" . }}-config
