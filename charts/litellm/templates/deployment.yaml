apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "litellm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "litellm.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "litellm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_LOG
              value: {{ .Values.env.LITELLM_LOG | quote }}
            - name: LITELLM_PORT
              value: {{ .Values.env.LITELLM_PORT | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | default .Values.env.LITELLM_PORT | quote }}
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.env.LITELLM_MASTER_KEY | quote }}
            - name: LITELLM_SALT_KEY
              value: {{ .Values.env.LITELLM_SALT_KEY | quote }}
            - name: DISABLE_DATABASE
              value: {{ .Values.env.DISABLE_DATABASE | quote }}
            - name: USE_DATABASE
              value: {{ .Values.env.USE_DATABASE | quote }}
            - name: STORE_MODEL_IN_DB
              value: {{ .Values.env.STORE_MODEL_IN_DB | quote }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          command:
            - "litellm"
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
            - "--host"
            - "0.0.0.0"
            - "--disable_database"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: {{ printf "%s-config" (include "litellm.fullname" .) }}
