apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: litellm-pg
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: database
spec:
  postgresVersion: 16
  instances:
    - name: primary
      replicas: 1
      dataVolumeClaimSpec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
  users:
    - name: litellm
      databases: ["litellmdb"]
      options: "CREATEDB"
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          max_connections: 100
