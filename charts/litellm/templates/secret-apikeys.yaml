{{- if .Values.apiKeys.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm.fullname" . }}-apikeys
  labels:
    app.kubernetes.io/name: {{ include "litellm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.apiKeys.openaiKey | quote }}
{{- end }}
