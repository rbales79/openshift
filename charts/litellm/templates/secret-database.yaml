apiVersion: v1
kind: Secret
metadata:
  name: litellm-db
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Replace with your actual Crunchy Postgres credentials before enabling DB readiness (/health) to pass.
  # Example: postgres://litellm:supersecret@postgres-primary:5432/litellmdb
  DATABASE_URL: postgres://litellm:changeme@postgres-primary:5432/litellmdb
