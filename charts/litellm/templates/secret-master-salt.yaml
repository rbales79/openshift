{{- if and (not .Values.masterSalt.existingSecret.name) .Values.masterSalt.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm.fullname" . }}-master-salt
  labels:
    app.kubernetes.io/name: {{ include "litellm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  LITELLM_MASTER_KEY: {{ .Values.masterSalt.masterKey | quote }}
  LITELLM_SALT_KEY: {{ .Values.masterSalt.saltKey | quote }}
{{- end }}