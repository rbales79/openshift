replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm
  tag: main-latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4000

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

route:
  enabled: false
  host: ""        # optional explicit host; empty lets OpenShift generate
  tls:
    enabled: false # if true, create TLS section below
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

existingSecret:
  name: llm-keys
  masterKey: LITELLM_MASTER_KEY
  saltKey: LITELLM_SALT_KEY

apiKeysSecret:
  create: true
  name: litellm-api-keys
  keys: []  # list of placeholder API keys, empty creates secret with no entries

env:
  LITELLM_LOG: INFO
  LITELLM_PORT: "4000"
  DISABLE_DATABASE: "True"
  USE_DATABASE: "False"
  STORE_MODEL_IN_DB: "False"

config:
  litellm_config: |
    model_list:
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: gpt-3.5-turbo

database:
  enabled: true
  # Expected external secret values (Crunchy Postgres): host, port, user, password, dbname
  secret:
    create: true
    name: litellm-db
    host: "postgres-primary"          # service name for crunchy cluster primary
    port: "5432"
    user: "litellm"                   # set user created in postgres cluster
    password: "changeme"              # override via values or external secret management
    dbname: "litellmdb"
  # If you prefer supplying a full DATABASE_URL instead of components, set fullUrl and leave components blank
  fullUrl: ""

resources: {}
