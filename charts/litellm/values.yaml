# Default values for litellm (clean baseline)
replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm
  tag: main-latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4000

# Basic static (non-secret) environment variables. Secret values should go in secret.data
env:
  LITELLM_LOG: INFO
  LITELLM_PORT: "4000"
  PORT: "4000"
  LITELLM_MASTER_KEY: "CHANGEME"
  LITELLM_SALT_KEY: "CHANGEME"
  # Disable database by default for a simpler first deployment
  DISABLE_DATABASE: "True"
  USE_DATABASE: "False"
  STORE_MODEL_IN_DB: "False"

# LiteLLM configuration mounted as /app/config.yaml
config:
  litellm_config: |
    model_list:
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: gpt-3.5-turbo
          api_key: os.environ/OPENAI_API_KEY

resources: {}

persistence:
  enabled: false
