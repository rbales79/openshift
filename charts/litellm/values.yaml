replicaCount: 1
image:
  repository: ghcr.io/berriai/litellm
  tag: main-latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 4000
resources: {}

env:
  LITELLM_LOG: INFO
  LITELLM_PORT: "4000"
  LITELLM_MASTER_KEY: ""
  LITELLM_SALT_KEY: ""
  DISABLE_DATABASE: "True"
  USE_DATABASE: "False"
  STORE_MODEL_IN_DB: "False"

config:
  litellm_config: |
    model_list:
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: gpt-3.5-turbo
          api_key: os.environ/OPENAI_API_KEY

# Add cluster metadata for Route construction
cluster:
  name: sandbox
  top_level_domain: example.com

# Optional API key configuration
apiKeys:
  enabled: false            # Master toggle for injecting an OpenAI API key
  openaiKey: ""             # The OpenAI API key value (used only if enabled=true)
  # Usage:
  # apiKeys:
  #   enabled: true
  #   openaiKey: sk-XXXX

# Persistence for any local caching or future database usage
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

# Probes configuration (adjust path if LiteLLM expose specific health route)
probes:
  path: /health
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
