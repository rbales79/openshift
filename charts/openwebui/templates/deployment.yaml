apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openwebui.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "openwebui.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "openwebui.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "openwebui.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WEBUI_SECRET_KEY
              value: {{ .Values.env.WEBUI_SECRET_KEY | default "secret-key" | quote }}
            - name: ENABLE_SIGNUP
              value: {{ .Values.env.ENABLE_SIGNUP | default "true" | quote }}
            - name: ENABLE_LOGIN_FORM
              value: {{ .Values.env.ENABLE_LOGIN_FORM | default "true" | quote }}
            - name: WEBUI_AUTH
              value: {{ .Values.env.WEBUI_AUTH | default "true" | quote }}
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openwebui.fullname" . }}-data
