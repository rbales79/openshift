# Default values for openwebui.
replicaCount: 1
image:
  repository: ghcr.io/open-webui/open-webui
  tag: main
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
resources: {}

env:
  WEBUI_SECRET_KEY: ""
  ENABLE_SIGNUP: "true"
  ENABLE_LOGIN_FORM: "true"
  WEBUI_AUTH: "true"
  
persistence:
  enabled: true
  size: 2Gi
  accessMode: ReadWriteOnce
