---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-volume
  labels:
    kasten/skip: "true"
spec:
  storageClassName: ""
  capacity:
    storage: 1Mi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: {{ .Values.storage.media.nfs.server }}
    path: {{ .Values.storage.media.nfs.path }}
  mountOptions:
    - nfsvers=4
    - nconnect=8
    - hard
    - noatime
    - rsize=131072
    - wsize=131072