apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: openshift-gitops
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: litellm
    server: {{ .Values.spec.destination.server }}
  project: default
  source:
    path: charts/litellm
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
    helm:
      parameters:
        - name: cluster.top_level_domain
          value: {{ .Values.cluster.top_level_domain }}
        - name: cluster.name
          value: {{ .Values.cluster.name }}
        - name: cluster.admin_email
          value: {{ .Values.cluster.admin_email }}
        - name: cluster.timezone
          value: {{ .Values.cluster.timezone }}

        - name: image.repository
          value: ghcr.io/berriai/litellm
        - name: image.tag
          value: main-latest
        - name: image.pullPolicy
          value: IfNotPresent

        - name: service.type
          value: ClusterIP
        - name: service.port
          value: '4000'

        - name: replicaCount
          value: '1'
        
        - name: env.LITELLM_LOG
          value: "INFO"
        - name: env.LITELLM_PORT
          value: "4000"
        - name: env.LITELLM_MASTER_KEY
          value: "sk-JDHDSi1azvdYmRhOI0M-CEdbff_pS0YseDBxOW_OqNw"
        - name: env.LITELLM_SALT_KEY
          value: "sk-is69yG7Vq34aRJNb_F6svkhSq0OwzwrEstN-exnpaavICvJFaKP2g9i0JXlCmWQ-"
        - name: env.DATABASE_URL
          value: "postgresql://litellm:litellmpassword@litellm-postgres-primary:5432/litellm"
        - name: env.PORT
          value: "4000"
        - name: env.STORE_MODEL_IN_DB
          value: "True"
        
        # Basic configuration - can be customized later
        - name: config.litellm_config
          value: |
            model_list:
              - model_name: gpt-3.5-turbo
                litellm_params:
                  model: gpt-3.5-turbo
                  api_key: os.environ/OPENAI_API_KEY
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
